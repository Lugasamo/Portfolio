title: Default Page
process:
  breadcrumbs: true
'@extends': default

form:
  fields:
    tabs:
      type: tabs
      active: 1

      fields:
        content:
          type: tab
          title: Content

          fields:
            header.project_media:
              type: file
              label: Project Media Gallery
              destination: 'self@'
              multiple: true
              limit: 0 
              accept:
                - image/jpeg
                - image/png
                - image/gif
                - video/mp4
                - video/webm
              help: Upload images (JPG, PNG, GIF) or videos (MP4, WEBM) to display in the project gallery.

            content:
              type: markdown
              label: Page Content

        profile:
          type: tab
          title: Profile

          fields:
            header.profile.name:
              type: text
              label: Name
              size: large

            header.profile.bio:
              type: textarea
              label: Bio
              rows: 4

            header.columnl.skills:
              type: textarea
              label: Skills Left Column
              rows: 5
              help: "Use </br> to separate skills on new lines"

            header.columnr.skills:
              type: textarea
              label: Skills Right Column
              rows: 5
              help: "Use </br> to separate skills on new lines"

            header.profile.image:
              type: filepicker
              folder: '@self'
              preview_images: true
              accept:
                - .jpg
                - .jpeg
                - .png
                - .gif
              label: Profile Image
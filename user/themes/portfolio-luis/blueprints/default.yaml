title: Default Page
process:
  breadcrumbs: true
'@extends': default

form:
  fields:
    tabs:
      type: tabs
      active: 1

      fields:
        content:
          type: tab
          title: Content

          fields:
            header.project_media:
              type: file
              label: Project Media Gallery
              destination: 'self@'
              multiple: true
              limit: 0 
              accept:
                - image/jpeg
                - image/png
                - image/gif
                - video/mp4
                - video/webm
              help: Upload images (JPG, PNG, GIF) or videos (MP4, WEBM) to display in the project gallery.

            content:
              type: markdown
              label: Page Content
            